services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-armexam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-armexam_pass}
      POSTGRES_DB: ${POSTGRES_DB:-armexam}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-armexam}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-armexam_secret_123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
