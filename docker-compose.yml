services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-armexam}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-armexam_secret_123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  minio_data:
